<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>서비스화 실행 후보 팩토리</title>
  <style>
    :root {
      --ink: #101615;
      --muted: #5e6d68;
      --paper: #f7f8f1;
      --panel: #ffffff;
      --line: #d6ded6;
      --green: #1d6b4a;
      --blue: #1f5d7a;
      --amber: #bd7b23;
      --rose: #bd4654;
      --shadow: 0 18px 48px rgba(18, 38, 32, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(29,107,74,.13), transparent 34%),
        linear-gradient(315deg, rgba(189,123,35,.13), transparent 38%),
        var(--paper);
    }
    main { width: min(1240px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0 60px; }
    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 16px;
    }
    .hero, .stat, .toolbar, .card, .playbook {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.92);
      box-shadow: var(--shadow);
    }
    .hero { padding: 30px; }
    .eyebrow { margin: 0 0 10px; color: var(--rose); font-weight: 900; }
    h1 { margin: 0; font-size: clamp(38px, 6vw, 78px); line-height: 1; letter-spacing: 0; }
    .lead { color: var(--muted); font-size: 18px; line-height: 1.55; max-width: 760px; }
    .stat { display: grid; gap: 8px; padding: 22px; background: #13241d; color: #fff; }
    .stat strong { color: #f1c15a; font-size: 44px; line-height: 1; }
    .stat span { color: #dce7df; line-height: 1.45; }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 3;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 16px;
      color: var(--ink);
      background: #fff;
    }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; }
    button, .link {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button.active { background: var(--green); border-color: var(--green); color: white; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card { padding: 18px; display: grid; gap: 12px; min-height: 330px; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 900; background: rgba(31,93,122,.12); color: var(--blue); }
    .pill.oss { background: rgba(29,107,74,.14); color: var(--green); }
    h2 { margin: 0; font-size: 21px; line-height: 1.25; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    .price { font-size: 18px; color: var(--amber); font-weight: 900; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-self: end; }
    .copy { background: var(--ink); color: #fff; border-color: var(--ink); }
    .playbook { margin-top: 16px; padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
    .playbook h2 { font-size: 24px; }
    .empty { grid-column: 1 / -1; padding: 30px; border: 1px dashed var(--line); border-radius: 8px; text-align: center; color: var(--muted); }
    @media (max-width: 960px) {
      header, .toolbar, .grid { grid-template-columns: 1fr; }
      .toolbar { position: static; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <section class="hero">
        <p class="eyebrow">Open-source backed service factory</p>
        <h1>서비스화 실행 후보 48개</h1>
        <p class="lead">이미 검증된 오픈소스와 기존 로컬 도구를 묶어서, 설치 대행·초기 세팅·월 유지보수로 팔 수 있는 서비스 후보를 한 화면에 모았습니다.</p>
      </section>
      <aside class="stat">
        <strong id="total-count">48</strong>
        <span>20개 이상은 오픈소스 기반, 나머지는 바로 납품 가능한 직접 제작형 서비스입니다. 수익은 보장하지 않고, 판매 가능한 실행 표면만 준비합니다.</span>
      </aside>
    </header>

    <section class="toolbar" aria-label="Service filters">
      <input id="service-search" type="search" placeholder="고객, 문제, 오픈소스, 서비스명 검색">
      <div class="filters">
        <button class="active" data-category="all">전체</button>
        <button data-category="automation">자동화</button>
        <button data-category="crm">CRM</button>
        <button data-category="support">CS</button>
        <button data-category="analytics">분석</button>
        <button data-category="content">콘텐츠</button>
      </div>
    </section>

    <section id="service-grid" class="grid" aria-live="polite"></section>

    <section class="playbook">
      <div>
        <h2>다음 액션</h2>
        <p>서비스 1개를 골라 고객 업종에 맞게 제목, 가격, 첫 작업 범위를 좁힌 뒤 영업 문구를 발송합니다.</p>
      </div>
      <a class="link" href="서비스팩토리_실행매뉴얼.md">실행매뉴얼</a>
      <a class="link" href="서비스팩토리_영업패키지.md">영업패키지</a>
    </section>
  </main>
  <script>
    const state = { services: [], category: "all", query: "" };
    const grid = document.querySelector("#service-grid");
    const total = document.querySelector("#total-count");
    const search = document.querySelector("#service-search");
    const buttons = [...document.querySelectorAll("[data-category]")];
    const params = new URLSearchParams(window.location.search);
    state.query = params.get("q") || "";
    state.category = params.get("category") || "all";
    search.value = state.query;
    buttons.forEach((item) => item.classList.toggle("active", item.dataset.category === state.category));

    const offerText = (service) => `${service.name}\n고객: ${service.customer}\n문제: ${service.problem}\n제안: ${service.offer}\n가격: ${service.price}\n첫 액션: ${service.firstAction}\n리스크: ${service.risk}`;

    const render = () => {
      const query = state.query.toLowerCase();
      const visible = state.services.filter((service) => {
        const categoryMatch = state.category === "all" || service.category === state.category;
        const searchText = Object.values(service).join(" ").toLowerCase();
        return categoryMatch && searchText.includes(query);
      });
      total.textContent = String(state.services.length);
      grid.innerHTML = visible.length ? visible.map((service) => `
        <article class="card">
          <div class="meta">
            <span class="pill">${service.category}</span>
            <span class="pill oss">${service.openSource}</span>
            <span class="pill">${service.mvpDays}일 MVP</span>
          </div>
          <h2>${service.name}</h2>
          <p><b>고객:</b> ${service.customer}</p>
          <p><b>문제:</b> ${service.problem}</p>
          <p><b>제안:</b> ${service.offer}</p>
          <p class="price">${service.price}</p>
          <p><b>첫 액션:</b> ${service.firstAction}</p>
          <p><b>주의:</b> ${service.risk}</p>
          <div class="actions">
            <a class="link" href="${service.sourceUrl}" target="_blank" rel="noreferrer">출처</a>
            <button class="copy" data-copy="${service.id}">복사</button>
          </div>
        </article>
      `).join("") : `<div class="empty">검색 결과가 없습니다. 다른 카테고리나 키워드를 입력하세요.</div>`;
    };

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        state.category = button.dataset.category;
        buttons.forEach((item) => item.classList.toggle("active", item === button));
        render();
      });
    });

    search.addEventListener("input", (event) => {
      state.query = event.target.value;
      const next = new URLSearchParams(window.location.search);
      state.query ? next.set("q", state.query) : next.delete("q");
      history.replaceState(null, "", `${window.location.pathname}?${next.toString()}`);
      render();
    });

    grid.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-copy]");
      if (!button) return;
      const service = state.services.find((item) => item.id === button.dataset.copy);
      if (!service) return;
      await navigator.clipboard.writeText(offerText(service));
      button.textContent = "복사됨";
      setTimeout(() => { button.textContent = "복사"; }, 900);
    });

    fetch("services.json")
      .then((response) => response.json())
      .then((services) => {
        state.services = services;
        render();
      })
      .catch(() => {
        grid.innerHTML = `<div class="empty">services.json을 불러오지 못했습니다.</div>`;
      });
  </script>
</body>
</html>
